packaging_format = 2

id = "traggo"
name = "Traggo"
description.en = "Tag-based time tracking tool"
description.fr = "Outil de suivi du temps basé sur des étiquettes"

version = "0.8.1~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
website = "https://traggo.net"
admindoc = "https://traggo.net/config/"
code = "https://github.com/traggo/server"

[integration]
yunohost = ">= 11.2.30"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true
ldap = false
sso = false
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]
        [resources.sources.main]
        in_subdir = false
        arm64.url = "https://github.com/traggo/server/releases/download/v0.8.1/traggo_0.8.1_linux_arm64.tar.gz"
        arm64.sha256 = "a8f1b3a092071f967c154c2a0e4963537e51ae21a8f0103eedc555086112d1fc"
        amd64.url = "https://github.com/traggo/server/releases/download/v0.8.1/traggo_0.8.1_linux_amd64.tar.gz"
        amd64.sha256 = "6490374d015619623f6626e08e540d7ca2395c15dd2039c220b33099e3226ce7"
        armhf.url = "https://github.com/traggo/server/releases/download/v0.8.1/traggo_0.8.1_linux_armv7.tar.gz"
        armhf.sha256 = "c9416c543bd746271b7e0a693da29b1e27b9eb33394bbcbc732b64569f297e7b"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.arm64 = "^traggo_.*_linux_arm64.tar.gz$"
        autoupdate.asset.amd64 = "^traggo_.*_linux_amd64.tar.gz$"
        autoupdate.asset.armhf = "^traggo_.*_linux_armv7.tar.gz$"


    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "sqlite3"
