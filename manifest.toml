packaging_format = 2

id = "traggo"
name = "Traggo"
description.en = "Tag-based time tracking tool"
description.fr = "Outil de suivi du temps basé sur des étiquettes"

version = "0.8.2~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
website = "https://traggo.net"
admindoc = "https://traggo.net/config/"
code = "https://github.com/traggo/server"

[integration]
yunohost = ">= 11.2.30"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true
ldap = false
sso = false
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]
        [resources.sources.main]
        in_subdir = false
        arm64.url = "https://github.com/traggo/server/releases/download/v0.8.2/traggo_0.8.2_linux_arm64.tar.gz"
        arm64.sha256 = "070b1a01605524d4eefca1ce1f346720b52139b2064252a6eb5ad7fcbdfc4bda"
        amd64.url = "https://github.com/traggo/server/releases/download/v0.8.2/traggo_0.8.2_linux_amd64.tar.gz"
        amd64.sha256 = "3e533d2ee0ec0f0afa76dd28626ac6d7f3828e74849962e450ab0c7052b81287"
        armhf.url = "https://github.com/traggo/server/releases/download/v0.8.2/traggo_0.8.2_linux_armv7.tar.gz"
        armhf.sha256 = "af80237a36bc9edcc9fb9a8be6d78f1997e54c1583c8d8a6c03ee49517da73d3"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.arm64 = "^traggo_.*_linux_arm64.tar.gz$"
        autoupdate.asset.amd64 = "^traggo_.*_linux_amd64.tar.gz$"
        autoupdate.asset.armhf = "^traggo_.*_linux_armv7.tar.gz$"


    [resources.ports]

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "sqlite3"
